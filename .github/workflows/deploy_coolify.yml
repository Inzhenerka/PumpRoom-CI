name: 🚀 Deploy Docker image

on:
  workflow_call:
    inputs:
      context:
        description: Docker build context
        type: string
        default: .
      dockerfile:
        description: Path to Dockerfile
        type: string
        default: ./Dockerfile
      image_name:
        description: Image name (defaults to lowercase repository name)
        type: string
        default: ''
      registry:
        description: Container registry
        type: string
        default: ghcr.io
      platforms:
        description: Comma-separated build platforms (e.g. linux/amd64,linux/arm64)
        type: string
        default: ''
      runs_on:
        description: Runner to use
        type: string
        default: ubuntu-latest
      environment:
        description: GitHub deployment environment name
        type: string
        default: ''
      url:
        description: GitHub deployment environment URL
        type: string
        default: ''
    secrets:
      coolify_webhook:
        description: Coolify deploy webhook URL
        required: true
      coolify_token:
        description: Coolify API token
        required: true
      build_args:
        description: |
          Multiline build args (KEY=VALUE per line) for docker build.
          Passed as secret so values are masked in logs.
        required: false

permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  deploy:
    name: 🚀 Build and deploy
    runs-on: ${{ inputs.runs_on }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6.0.2

      - name: 🏷️ Prepare image name
        id: image
        shell: bash
        run: |
          if [[ -n "${{ inputs.image_name }}" ]]; then
            echo "name=${{ inputs.registry }}/${{ inputs.image_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.registry }}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          fi

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: 🔐 Log in to registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧾 Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ secrets.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Deploy to Coolify
        run: |
          status=$(curl -s -o response.txt -w '%{http_code}' \
            --request GET "${{ secrets.coolify_webhook }}" \
            --header "Authorization: Bearer ${{ secrets.coolify_token }}")
          echo "Response status: $status"
          cat response.txt || true
          echo
          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            echo "❌ Coolify deploy webhook failed"
            exit 1
          fi
          echo "✅ Coolify deploy triggered"

      - name: 🏁 Create GitHub deployment
        if: ${{ inputs.environment != '' }}
        uses: chrnorm/deployment-action@v2.0.8
        with:
          token: ${{ github.token }}
          initial-status: success
          environment-url: ${{ inputs.url }}
          environment: ${{ inputs.environment }}
